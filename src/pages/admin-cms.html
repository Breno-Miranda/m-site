<!-- Version: V0.10.31 -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<section class="dev-section pt-5 mt-5 pb-5">
    <div class="container-fluid" style="max-width: 1400px;">
        <div class="card bg-black border-secondary border-opacity-25 shadow-lg" style="border-radius: 24px;">
            <div class="card-body p-4 p-lg-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="dev-section-title m-0">CMS Dashboard</h2>
                <p class="text-muted m-0">Personalização Visual e Conteúdo Estático do Site</p>
            </div>
            <div>
                <span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 px-3 py-2 rounded-pill shadow-sm">
                    <i class="bi bi-shield-check me-2"></i>Admin Privileges
                </span>
            </div>
        </div>

        <!-- Protected Content -->
        <div id="admin-content" style="display: none;">
            <div class="row g-4">
                <!-- Sidebar -->
                <div class="col-md-3">
                    <div class="list-group bg-dark">
                        <button class="list-group-item list-group-item-action active bg-primary border-primary"
                            onclick="loadTab('theme')">
                            <i class="bi bi-palette-fill me-2"></i> Cores e Tipografia
                        </button>
                        <button class="list-group-item list-group-item-action bg-dark text-white border-secondary"
                            onclick="loadTab('content')">
                            <i class="bi bi-file-earmark-text-fill me-2"></i> Textos e Links
                        </button>
                        <button class="list-group-item list-group-item-action bg-dark text-white border-secondary"
                            onclick="loadTab('images')">
                            <i class="bi bi-images me-2"></i> Imagens do Site
                        </button>
                        <button class="list-group-item list-group-item-action bg-dark text-white border-secondary"
                            onclick="loadTab('blog')">
                            <i class="bi bi-journal-text me-2"></i> Postagens de Blog
                        </button>
                        <button class="list-group-item list-group-item-action bg-dark text-white border-secondary"
                            onclick="loadTab('logs')">
                            <i class="bi bi-activity me-2"></i> Logs e Acessos
                        </button>
                    </div>
                </div>

                <!-- Main Area -->
                <div class="col-md-9">
                    <div class="card bg-dark border-secondary">
                        <div class="card-body" id="tab-content">
                            <!-- Injeção via JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Access Denied -->
        <div id="access-denied" class="text-center py-5" style="display: none;">
            <i class="bi bi-shield-lock-fill fs-1 text-danger mb-3"></i>
            <h3>Acesso Negado</h3>
            <p class="text-muted">Acesso restrito ao Content Manager.</p>
            <a href="/" class="btn btn-secondary mt-3">Voltar para Home</a>
        </div>
            </div>
        </div>
    </div>
</section>

<script>
    (function () {
        const auth = window.authService;
        const content = document.getElementById('admin-content');
        const denied = document.getElementById('access-denied');

        window.loadTab = async function (tab) {
            // Update Active State
            const btns = document.querySelectorAll('.list-group-item');
            btns.forEach(el => el.classList.remove('active', 'bg-primary', 'border-primary'));
            btns.forEach(el => el.classList.add('bg-dark', 'text-white', 'border-secondary'));

            const eventObj = event;
            if (eventObj) {
                const activeBtn = eventObj.currentTarget;
                if (activeBtn) {
                    activeBtn.classList.add('active', 'bg-primary', 'border-primary');
                    activeBtn.classList.remove('bg-dark', 'text-white', 'border-secondary');
                }
            }

            const container = document.getElementById('tab-content');

            if (tab === 'theme') {
                container.innerHTML = `
                    <h4 class="mb-4">Personalização Visual (Cores e Fontes)</h4>
                    <div class="alert alert-info"><i class="bi bi-info-circle me-2"></i> Aqui você pode alterar a identidade visual base do site.</div>
                    
                    <form id="theme-form" class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Cor Primária (HEX)</label>
                            <input type="color" class="form-control form-control-color bg-black border-secondary" value="#000000" title="Escolha a cor primária">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Cor de Destaque / Acentos (HEX)</label>
                            <input type="color" class="form-control form-control-color bg-black border-secondary" value="#28a745" title="Escolha a cor de sucesso">
                        </div>
                        <div class="col-md-12 mt-4">
                            <label class="form-label">Tipografia Principal (Google Fonts)</label>
                            <select class="form-select bg-black border-secondary text-white">
                                <option value="Inter">Inter (Padrão)</option>
                                <option value="Roboto">Roboto</option>
                                <option value="Poppins">Poppins</option>
                                <option value="Outfit">Outfit</option>
                            </select>
                        </div>
                        <div class="col-12 text-end mt-4">
                            <button type="button" class="btn btn-primary" onclick="window.core.toast('Tema atualizado com sucesso!', 'success')">Salvar Tema</button>
                        </div>
                    </form>
                `;
            } else if (tab === 'content') {
                container.innerHTML = `
                    <h4 class="mb-4">Textos e Links</h4>
                    <div class="alert alert-warning"><i class="bi bi-exclamation-triangle me-2"></i> Redirecionando para o editor detalhado de rotas...</div>
                    <div class="d-grid gap-2 mt-4">
                        <a href="/cms" class="btn btn-outline-primary py-3">
                            <i class="bi bi-pencil-square me-2"></i> Abrir Editor Completo de Conteúdo (JSON/Formulários)
                        </a>
                    </div>
                `;
            } else if (tab === 'logs') {
                container.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>';
                try {
                    const res = await window.core.fetchAPI('/logs');
                    let logsHtml = '';
                    if (res && res.success && res.data && res.data.length > 0) {
                        res.data.forEach(log => {
                            let color = 'text-success';
                            if (log.level === 'warning') color = 'text-warning';
                            if (log.level === 'error') color = 'text-danger';
                            const date = new Date(log.createdAt).toLocaleString('pt-BR');
                            const userTag = log.user ? '(ID: ' + log.user + ')' : '';
                            logsHtml += `<div class="${color}">[${date}] [${log.action}] ${log.details} ${userTag}</div>`;
                        });
                    } else {
                        logsHtml = '<div class="text-muted">Nenhum log de acesso registrado na API ainda.</div>';
                    }
                    container.innerHTML = `
                        <h4 class="mb-4">Monitoramento de Tráfego e Acessos</h4>
                        <div class="alert alert-dark border-secondary"><i class="bi bi-eye text-primary me-2"></i>Acompanhe as conexões, logins e eventos críticos do site momentaneamente.</div>
                        <div class="bg-black p-3 rounded font-monospace small" style="height: 400px; overflow-y: auto;">
                            ${logsHtml}
                        </div>
                        <div class="text-end mt-3">
                            <button class="btn btn-outline-secondary btn-sm" onclick="loadTab('logs')"><i class="bi bi-arrow-clockwise me-1"></i> Atualizar Visão</button>
                        </div>
                    `;
                } catch (e) {
                    container.innerHTML = '<div class="alert alert-danger">Falha ao se conectar com a API de Logs do M-Manage.</div>';
                }
            } else if (tab === 'blog') {
                container.innerHTML = `
                    <h4 class="mb-4">Gerenciador de Blog</h4>
                    <div class="alert alert-dark border-secondary"><i class="bi bi-info-circle me-2"></i> Crie, edite e gerencie os posts em destaque e de tecnologia geral na página /blog.</div>
                    
                    <div class="d-flex justify-content-end mb-3">
                        <button class="btn btn-primary btn-sm" onclick="showBlogForm()"><i class="bi bi-plus-lg me-1"></i> Nova Postagem</button>
                    </div>
                    <div id="blog-list-container" class="mt-3">
                        <div class="text-center py-4"><div class="spinner-border text-primary" role="status"></div></div>
                    </div>
                    
                    <div id="blog-form-container" style="display: none;" class="mt-4 border-top border-secondary pt-4">
                        <h5>Formulário de Postagem</h5>
                        <form id="new-blog-form" class="row g-3">
                            <input type="hidden" id="blog-id" name="id">
                            <div class="col-md-6">
                                <label class="form-label">Título</label>
                                <input type="text" class="form-control bg-black border-secondary text-white" id="blog-title" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Slug (URL amigável)</label>
                                <input type="text" class="form-control bg-black border-secondary text-white" id="blog-slug" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Autor</label>
                                <input type="text" class="form-control bg-black border-secondary text-white" id="blog-author" value="Breno Miranda" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Categoria</label>
                                <input type="text" class="form-control bg-black border-secondary text-white" id="blog-category" list="blog-categories" placeholder="Ex: Tecnologia">
                                <datalist id="blog-categories">
                                    <option value="Tecnologia">
                                    <option value="White Label">
                                    <option value="Produtividade">
                                    <option value="Design">
                                    <option value="Negócios">
                                    <option value="Marketing">
                                </datalist>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Tags (separadas por vírgula)</label>
                                <input type="text" class="form-control bg-black border-secondary text-white" id="blog-tags" placeholder="Ex: seo, frontend, gpt">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Imagem (URL)</label>
                                <input type="text" class="form-control bg-black border-secondary text-white" id="blog-imageUrl">
                            </div>
                            <div class="col-md-12 mt-3">
                                <label class="form-label">Conteúdo (Quill Editor)</label>
                                <div id="quill-editor-container" class="bg-light text-dark rounded border border-secondary" style="min-height: 250px;"></div>
                                <input type="hidden" id="blog-content">
                            </div>
                            <div class="col-12 mt-3">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="blog-published" checked>
                                    <label class="form-check-label text-white" for="blog-published">Publicado</label>
                                </div>
                            </div>
                            <div class="col-12 text-end mt-4">
                                <button type="button" class="btn btn-secondary me-2" onclick="hideBlogForm()">Cancelar</button>
                                <button type="button" class="btn btn-success" onclick="saveBlogForm()">Salvar Postagem</button>
                            </div>
                        </form>
                    </div>
                `;

                // Funções auxiliares pro Blog
                window.refreshBlogList = async function() {
                    try {
                        const res = await window.core.fetchAPI('/blogs/all');
                        const listEl = document.getElementById('blog-list-container');
                        if (res && res.success && res.data.length > 0) {
                            let listHtml = '<div class="list-group">';
                            res.data.forEach(blog => {
                                const status = blog.published ? '<span class="badge bg-success">Publicado</span>' : '<span class="badge bg-warning text-dark">Rascunho</span>';
                                listHtml += `
                                    <div class="list-group-item bg-black border-secondary mb-2 rounded d-flex justify-content-between align-items-center flex-wrap">
                                        <div>
                                            <h6 class="text-white mb-1"><a href="/blog/${blog.slug}" target="_blank" class="text-decoration-none text-light">${blog.title}</a> ${status}</h6>
                                            <p class="mb-0 text-muted small">Categoria: ${blog.category || 'N/A'} | Views: ${blog.views || 0}</p>
                                        </div>
                                        <div>
                                            <button class="btn btn-sm btn-outline-danger" onclick="deleteBlog('${blog._id}')" title="Excluir"><i class="bi bi-trash"></i></button>
                                        </div>
                                    </div>
                                `;
                            });
                            listHtml += '</div>';
                            listEl.innerHTML = listHtml;
                        } else {
                            listEl.innerHTML = '<div class="alert alert-dark border-secondary bg-black text-white text-center">Nenhuma postagem adicionada.</div>';
                        }
                    } catch (e) {
                        const listEl = document.getElementById('blog-list-container');
                        if (listEl) listEl.innerHTML = '<div class="text-danger">Erro de contexto com M-Manage ao carregar blogs.</div>';
                    }
                };

                window.showBlogForm = function() {
                    const formStr = document.getElementById('new-blog-form');
                    if (formStr) formStr.reset();
                    document.getElementById('blog-id').value = '';
                    document.getElementById('blog-author').value = 'Breno Miranda';
                    document.getElementById('blog-category').value = 'Tecnologia';
                    document.getElementById('blog-tags').value = '';
                    document.getElementById('blog-published').checked = true;
                    document.getElementById('blog-form-container').style.display = 'block';

                    // Inicializando o QuillJS
                    if (!window.quillEditorInstance) {
                        try {
                            window.quillEditorInstance = new Quill('#quill-editor-container', {
                                theme: 'snow',
                                placeholder: 'Escreva a sua postagem de forma rica aqui...',
                                modules: {
                                    toolbar: [
                                        [{ 'header': [1, 2, 3, 4, false] }],
                                        ['bold', 'italic', 'underline', 'strike'],
                                        ['blockquote', 'code-block'],
                                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                                        [{ 'align': [] }],
                                        ['link', 'image', 'video'],
                                        ['clean']
                                    ]
                                }
                            });
                            window.quillEditorInstance.on('text-change', function() {
                                document.getElementById('blog-content').value = window.quillEditorInstance.root.innerHTML;
                            });
                        } catch(e) { console.error('Quill não carregou: ', e); }
                    } else {
                        window.quillEditorInstance.root.innerHTML = '';
                    }
                    document.getElementById('blog-content').value = '';
                };

                window.hideBlogForm = function() {
                    document.getElementById('blog-form-container').style.display = 'none';
                };

                window.saveBlogForm = async function() {
                    const id = document.getElementById('blog-id').value;
                    const tagsStr = document.getElementById('blog-tags').value;
                    const payload = {
                        title: document.getElementById('blog-title').value,
                        slug: document.getElementById('blog-slug').value,
                        author: document.getElementById('blog-author').value,
                        category: document.getElementById('blog-category').value,
                        tags: tagsStr ? tagsStr.split(',').map(t => t.trim()).filter(Boolean) : [],
                        imageUrl: document.getElementById('blog-imageUrl').value,
                        content: document.getElementById('blog-content').value,
                        published: document.getElementById('blog-published').checked
                    };
                    
                    if (!payload.title || !payload.slug || !payload.content) {
                        window.core.toast('Preencha os campos obrigatórios.', 'error');
                        return;
                    }

                    try {
                        const endpoint = id ? '/blogs/' + id : '/blogs';
                        const method = id ? 'PUT' : 'POST';
                        const res = await window.core.fetchAPI(endpoint, method, payload);
                        if (res && res.success) {
                            window.core.toast('Postagem salva com sucesso!', 'success');
                            hideBlogForm();
                            refreshBlogList();
                        } else {
                            window.core.toast('Erro ao salvar: ' + (res.error || 'Desconhecido'), 'error');
                        }
                    } catch(e) {
                        window.core.toast('Erro de rede. Verifique a API.', 'error');
                    }
                };

                window.deleteBlog = async function(id) {
                    if (!confirm('Excluir esta postagem de forma permanente?')) return;
                    try {
                        const res = await window.core.fetchAPI('/blogs/' + id, 'DELETE');
                        if (res && res.success) {
                            window.core.toast('Post excluído!', 'success');
                            refreshBlogList();
                        } else {
                            window.core.toast('Erro ao excluir', 'error');
                        }
                    } catch(e) {
                        window.core.toast('Erro de rede!', 'error');
                    }
                };

                // Trigger inicial
                window.refreshBlogList();
            } else if (tab === 'images') {
                container.innerHTML = `
                    <h4 class="mb-4">Galeria e Assets do Site</h4>
                    <p class="text-muted">Gerenciamento de Logos, Favicons e Banners da Homepage.</p>
                    
                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="card bg-black border-secondary h-100">
                                <div class="card-body text-center">
                                    <h6 class="text-white mb-3">Logo Principal</h6>
                                    <div class="bg-dark p-3 rounded mb-3 d-flex align-items-center justify-content-center" style="height: 100px;">
                                        <i class="bi bi-image text-muted fs-1"></i>
                                    </div>
                                    <button class="btn btn-sm btn-outline-light w-100">Fazer Upload</button>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card bg-black border-secondary h-100">
                                <div class="card-body text-center">
                                    <h6 class="text-white mb-3">Favicon</h6>
                                    <div class="bg-dark p-3 rounded mb-3 d-flex align-items-center justify-content-center" style="height: 100px;">
                                        <i class="bi bi-image text-muted fs-1"></i>
                                    </div>
                                    <button class="btn btn-sm btn-outline-light w-100">Fazer Upload</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        if (auth && auth.isAuthenticated() && auth.hasRole('admin')) {
            content.style.display = 'block';
            loadTab('theme');
        } else {
            denied.style.display = 'block';
        }
    })();
</script>
