<!-- MCredential - Password Manager Page -->
<!-- Version: V0.11.52 -->

<link rel="stylesheet" href="/src/assets/css/mcredential.css">

<!-- Main Wrapper -->
<div class="mcredential-wrapper">
    <!-- Login Screen (Bypassed but kept for structure) -->
    <div id="mcred-login-screen" class="login-screen" style="display: none;">
        <div class="login-container">
            <div class="login-logo"><i class="bi bi-shield-lock-fill"></i></div>
            <h1 class="login-title">MCredential</h1>
            <p class="login-subtitle">Seu cofre de senhas seguro</p>
        </div>
    </div>

    <!-- App Container -->
    <div id="mcred-app-container" class="app-container" style="display: block;">
        <!-- Header -->
        <header class="app-header">
            <div class="header-logo">
                <i class="bi bi-shield-lock-fill"></i>
                <span class="gradient-text">MCredential</span>
            </div>
            <div class="header-actions">
                <button id="mcred-add-button" class="btn btn-primary btn-sm">
                    <i class="bi bi-plus-lg"></i> Nova Senha
                </button>
                <a href="/premium" class="btn btn-secondary btn-sm btn-icon" title="Voltar ao Hub">
                    <i class="bi bi-grid"></i>
                </a>
                <button id="mcred-logout-button" class="btn btn-secondary btn-sm btn-icon" title="Atualizar">
                    <i class="bi bi-arrow-clockwise"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-main">
            <!-- Search & Filters -->
            <section class="search-section">
                <div class="search-wrapper">
                    <i class="bi bi-search"></i>
                    <input type="text" id="mcred-search-input" class="search-input" placeholder="Buscar credenciais...">
                </div>
                <div id="mcred-category-filter" class="category-filter"></div>
            </section>

            <!-- Loading Spinner -->
            <div id="mcred-loading" class="loading-spinner hidden">
                <div class="spinner"></div>
            </div>

            <!-- Credentials Grid -->
            <div id="mcred-credentials-grid" class="credentials-grid"></div>
        </main>
    </div>

    <!-- Credential Modal -->
    <div id="mcred-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="mcred-modal-title" class="modal-title">Detalhes da Credencial</h3>
                <button id="mcred-modal-close" class="modal-close"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="modal-body">
                <!-- Área de Visualização (Texto Impresso) -->
                <div id="mcred-view-area" style="display: none;">
                    <div class="view-item mb-4 text-center pb-3 border-bottom border-secondary border-opacity-10">
                        <div id="view-icon" class="fs-1 text-primary mb-2"></div>
                        <div id="view-title" class="text-white fs-4 fw-bold"></div>
                        <div id="view-category-badge" class="badge-tech mt-2"></div>
                    </div>
                    
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="text-muted extra-small fw-bold text-uppercase d-block mb-1">Usuário / E-mail</label>
                            <div class="d-flex align-items-center gap-2">
                                <div id="view-username" class="text-white"></div>
                                <button class="btn btn-link btn-sm p-0 text-primary" onclick="MCredApp.copyFromView('view-username')"><i class="bi bi-copy"></i></button>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="text-muted extra-small fw-bold text-uppercase d-block mb-1">URL / Link</label>
                            <div id="view-url" class="text-info text-truncate"></div>
                        </div>
                        <div class="col-12">
                            <label class="text-muted extra-small fw-bold text-uppercase d-block mb-1">Notas e Observações</label>
                            <div id="view-notes" class="p-3 rounded bg-secondary bg-opacity-10 text-white opacity-75" style="white-space: pre-wrap; font-size: 0.9rem; min-height: 60px;"></div>
                        </div>
                    </div>
                </div>

                <!-- Área de Edição (Formulário) -->
                <form id="mcred-credential-form" style="display: none;">
                    <div class="row g-3">
                        <div class="col-md-12">
                            <div class="form-group">
                                <label for="mcred-form-title">Título / Site</label>
                                <input type="text" id="mcred-form-title" class="form-input" placeholder="Ex: JIRA, Gmail, etc." required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="mcred-form-username">Usuário / E-mail</label>
                                <input type="text" id="mcred-form-username" class="form-input" placeholder="Usuário" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="mcred-form-password">Senha</label>
                                <div class="password-input-wrapper">
                                    <input type="text" id="mcred-form-password" class="form-input" placeholder="Senha" required>
                                    <button type="button" class="password-gen-btn" onclick="MCredApp.generateFormPassword()" title="Gerar Senha Forte">
                                        <i class="bi bi-magic"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="mcred-form-url">URL do Site</label>
                                <input type="url" id="mcred-form-url" class="form-input" placeholder="https://...">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="mcred-form-category">Categoria</label>
                                <select id="mcred-form-category" class="form-input">
                                    <option value="trabalho">Trabalho</option>
                                    <option value="pessoal">Pessoal</option>
                                    <option value="financeiro">Financeiro</option>
                                    <option value="social">Redes Sociais</option>
                                    <option value="outros">Outros</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label for="mcred-form-notes">Notas / Observações</label>
                                <textarea id="mcred-form-notes" class="form-input" rows="3" placeholder="Observações adicionais..."></textarea>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" id="mcred-delete-credential" class="btn btn-danger btn-sm" style="display: none;">
                    <i class="bi bi-trash"></i> Excluir
                </button>
                <button type="button" id="mcred-modal-cancel" class="btn btn-secondary">Fechar</button>
                <button type="submit" id="mcred-save-button" form="mcred-credential-form" class="btn btn-primary" style="display: none;">
                    <i class="bi bi-check2"></i> Salvar Alterações
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="mcred-toast-container" class="toast-container"></div>
</div>

<script>
    /**
     * MCredential - Crypto & API Bridge
     */
    const MApiService = (function () {
        async function fetchCredentials() {
            try {
                const user = JSON.parse(localStorage.getItem('msoft_user_data') || '{}');
                const userId = user.id || user._id;
                const endpoint = userId ? `/credentials?limit=100&rule=movida&userId=${userId}` : `/credentials?limit=100`;
                const data = await window.core.fetchAPI(endpoint, 'GET');

                if (data.success && Array.isArray(data.data)) {
                    return data.data.map(item => {
                        const doc = item.document?.password || {};
                        const rawPass = item.passwordEncrypted || item.password || doc.passwordEncrypted || doc.password || '';
                        
                        let id = item.id || item._id;
                        if (typeof id === 'object' && id !== null) id = id.$oid || id.toString();
                        if (typeof doc.id === 'object' && doc.id !== null) id = doc.id.$numberLong || id;

                        let category = doc.category || item.category || 'outros';
                        if (category === 'work') category = 'trabalho';
                        if (category === 'personal') category = 'pessoal';
                        if (category === 'finance') category = 'financeiro';
                        if (category === 'social_media') category = 'social';

                        return {
                            id: String(id),
                            username: doc.username || item.username || item.email || '',
                            title: doc.siteName || item.title || item.siteName || item.service || 'Sem Título',
                            password: rawPass,
                            url: doc.siteUrl || item.url || '',
                            category: category,
                            notes: doc.notes || item.notes || ''
                        };
                    });
                }
                return [];
            } catch (e) { return []; }
        }

        async function saveCredential(id, credential) {
            const sendData = { ...credential };
            if (id) delete sendData.id;
            const endpoint = id ? `/credentials/${id}` : '/credentials';
            return await window.core.fetchAPI(endpoint, id ? 'PUT' : 'POST', sendData);
        }

        async function deleteCredential(id) {
            if (!id) return { success: false };
            return await window.core.fetchAPI(`/credentials/${id}`, 'DELETE');
        }

        return { fetchCredentials, saveCredential, deleteCredential };
    })();

    const MCredApp = (function () {
        let credentials = [];
        let currentCredentialId = null;
        let currentFilter = 'all';
        let searchQuery = '';

        const categories = [
            { id: 'all', name: 'Todos', icon: 'bi-grid' },
            { id: 'trabalho', name: 'Trabalho', icon: 'bi-briefcase' },
            { id: 'pessoal', name: 'Pessoal', icon: 'bi-person' },
            { id: 'financeiro', name: 'Financeiro', icon: 'bi-bank' },
            { id: 'social', name: 'Redes Sociais', icon: 'bi-share' },
            { id: 'outros', name: 'Outros', icon: 'bi-folder' }
        ];

        const el = {};

        function init() {
            cacheElements();
            bindEvents();
            loadCredentialsFromAPI();
            renderCategories();
        }

        function cacheElements() {
            el.appContainer = document.getElementById('mcred-app-container');
            el.categoryFilter = document.getElementById('mcred-category-filter');
            el.credentialsGrid = document.getElementById('mcred-credentials-grid');
            el.modal = document.getElementById('mcred-modal');
            el.modalTitle = document.getElementById('mcred-modal-title');
            el.credentialForm = document.getElementById('mcred-credential-form');
            el.saveButton = document.getElementById('mcred-save-button');
            el.viewArea = document.getElementById('mcred-view-area');
            el.toastContainer = document.getElementById('mcred-toast-container');
            el.searchInput = document.getElementById('mcred-search-input');
            
            // View Area Elements
            el.viewTitle = document.getElementById('view-title');
            el.viewIcon = document.getElementById('view-icon');
            el.viewUsername = document.getElementById('view-username');
            el.viewCategoryBadge = document.getElementById('view-category-badge');
            el.viewUrl = document.getElementById('view-url');
            el.viewNotes = document.getElementById('view-notes');

            // Form Fields
            el.formTitle = document.getElementById('mcred-form-title');
            el.formUsername = document.getElementById('mcred-form-username');
            el.formPassword = document.getElementById('mcred-form-password');
            el.formUrl = document.getElementById('mcred-form-url');
            el.formCategory = document.getElementById('mcred-form-category');
            el.formNotes = document.getElementById('mcred-form-notes');
        }

        function bindEvents() {
            document.getElementById('mcred-add-button')?.addEventListener('click', () => openModal(null, 'edit'));
            document.getElementById('mcred-logout-button')?.addEventListener('click', () => loadCredentialsFromAPI());
            el.searchInput?.addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                renderCredentials();
            });
            document.getElementById('mcred-modal-close')?.addEventListener('click', closeModal);
            document.getElementById('mcred-modal-cancel')?.addEventListener('click', closeModal);
            el.credentialForm?.addEventListener('submit', handleSaveCredential);
            document.getElementById('mcred-delete-credential')?.addEventListener('click', handleDeleteCredential);

            el.credentialsGrid?.addEventListener('click', (e) => {
                const actionBtn = e.target.closest('.action-btn');
                if (actionBtn) openModal(actionBtn.dataset.id, actionBtn.dataset.mode);

                const copyBtn = e.target.closest('.copy-btn');
                if (copyBtn) copyToClipboard(copyBtn.dataset.text, copyBtn);

                const toggleBtn = e.target.closest('.toggle-password-btn');
                if (toggleBtn) {
                    const field = toggleBtn.closest('.credential-field').querySelector('.field-password');
                    const real = toggleBtn.dataset.password;
                    const icon = toggleBtn.querySelector('i');
                    if (toggleBtn.classList.contains('showing')) {
                        field.textContent = '••••••••';
                        icon.classList.replace('bi-eye-slash', 'bi-eye');
                        toggleBtn.classList.remove('showing');
                    } else {
                        field.textContent = real;
                        icon.classList.replace('bi-eye', 'bi-eye-slash');
                        toggleBtn.classList.add('showing');
                    }
                }
            });
        }

        function decodePassword(encoded) {
            if (!encoded || encoded.length < 4) return encoded || '';
            try {
                const decoded = atob(encoded);
                const salt = 'movida_passwords_2024';
                return decoded.endsWith(salt) ? decoded.slice(0, -salt.length) : decoded;
            } catch (e) { return encoded; }
        }

        function encodePassword(raw) {
            if (!raw) return '';
            const salt = 'movida_passwords_2024';
            try { return btoa(raw + salt); } catch (e) { return btoa(unescape(encodeURIComponent(raw + salt))); }
        }

        async function loadCredentialsFromAPI() {
            showLoading(true);
            credentials = await MApiService.fetchCredentials();
            renderCredentials();
            showLoading(false);
        }

        function renderCredentials() {
            let filtered = credentials;
            if (currentFilter !== 'all') filtered = filtered.filter(c => c.category === currentFilter);
            if (searchQuery) {
                filtered = filtered.filter(c => 
                    c.title.toLowerCase().includes(searchQuery) || 
                    c.username.toLowerCase().includes(searchQuery)
                );
            }

            if (filtered.length === 0) {
                el.credentialsGrid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><h3>Nenhum registro</h3></div>`;
                return;
            }

            el.credentialsGrid.innerHTML = filtered.map(cred => {
                const plain = decodePassword(cred.password);
                return `
                <div class="credential-card">
                    <div class="credential-header">
                        <div class="credential-info">
                            <div class="credential-icon"><i class="bi ${getCategoryIcon(cred.category)}"></i></div>
                            <div>
                                <h4 class="credential-title">${escapeHtml(cred.title)}</h4>
                                <span class="credential-category">${getCategoryName(cred.category)}</span>
                            </div>
                        </div>
                    </div>
                    <div class="credential-body">
                        ${cred.url ? `<div class="credential-field"><div><div class="field-label">URL</div><div class="field-value">${escapeHtml(truncate(cred.url, 25))}</div></div><button class="copy-btn" data-text="${escapeHtml(cred.url)}"><i class="bi bi-copy"></i></button></div>` : ''}
                        <div class="credential-field"><div><div class="field-label">Usuário</div><div class="field-value">${escapeHtml(cred.username)}</div></div><button class="copy-btn" data-text="${escapeHtml(cred.username)}"><i class="bi bi-copy"></i></button></div>
                        <div class="credential-field">
                            <div><div class="field-label">Senha</div><div class="field-value field-password">••••••••</div></div>
                            <div class="password-actions">
                                <button class="toggle-password-btn" data-password="${escapeHtml(plain)}" title="Ver"><i class="bi bi-eye"></i></button>
                                <button class="copy-btn" data-text="${escapeHtml(plain)}"><i class="bi bi-copy"></i></button>
                            </div>
                        </div>
                    </div>
                    <div class="credential-actions">
                        <button class="btn btn-secondary btn-sm action-btn" data-id="${cred.id}" data-mode="view"><i class="bi bi-eye"></i> Detalhes</button>
                        <button class="btn btn-secondary btn-sm action-btn" data-id="${cred.id}" data-mode="edit"><i class="bi bi-pencil"></i> Editar</button>
                    </div>
                </div>`;
            }).join('');
        }

        function openModal(id = null, mode = 'view') {
            currentCredentialId = id ? String(id) : null;
            el.credentialForm.reset();
            
            // Toggle Areas
            el.viewArea.style.display = mode === 'view' ? 'block' : 'none';
            el.credentialForm.style.display = mode === 'edit' ? 'block' : 'none';
            el.saveButton.style.display = mode === 'edit' ? 'block' : 'none';

            if (currentCredentialId) {
                const cred = credentials.find(c => String(c.id) === currentCredentialId);
                if (cred) {
                    if (mode === 'view') {
                        el.modalTitle.textContent = 'Detalhes da Credencial';
                        el.viewTitle.textContent = cred.title;
                        el.viewIcon.innerHTML = `<i class="bi ${getCategoryIcon(cred.category)}"></i>`;
                        el.viewUsername.textContent = cred.username;
                        el.viewCategoryBadge.textContent = getCategoryName(cred.category);
                        el.viewUrl.innerHTML = cred.url ? `<a href="${cred.url}" target="_blank" class="text-info">${cred.url}</a>` : 'Não informada';
                        el.viewNotes.textContent = cred.notes || 'Nenhuma observação.';
                        document.getElementById('mcred-delete-credential').style.display = 'none';
                    } else {
                        el.modalTitle.textContent = 'Editar Credencial';
                        el.formTitle.value = cred.title;
                        el.formUsername.value = cred.username;
                        el.formPassword.value = decodePassword(cred.password);
                        el.formUrl.value = cred.url;
                        el.formCategory.value = cred.category;
                        el.formNotes.value = cred.notes;
                        document.getElementById('mcred-delete-credential').style.display = 'block';
                    }
                }
            } else {
                el.modalTitle.textContent = 'Nova Credencial';
                el.formCategory.value = 'pessoal';
                document.getElementById('mcred-delete-credential').style.display = 'none';
            }
            el.modal.classList.add('active');
        }

        function closeModal() { el.modal.classList.remove('active'); currentCredentialId = null; }

        async function handleSaveCredential(e) {
            e.preventDefault();
            const data = {
                title: el.formTitle.value.trim(),
                username: el.formUsername.value.trim(),
                password: encodePassword(el.formPassword.value.trim()),
                url: el.formUrl.value.trim(),
                category: el.formCategory.value,
                notes: el.formNotes.value.trim()
            };
            const user = JSON.parse(localStorage.getItem('msoft_user_data') || '{}');
            data.userId = user.id || user._id;

            showLoading(true);
            const res = await MApiService.saveCredential(currentCredentialId, data);
            if (res.success) {
                showToast('Salvo com sucesso!', 'success');
                await loadCredentialsFromAPI();
                closeModal();
            } else { 
                const msg = res.message || 'Erro ao conectar ao servidor';
                showToast(msg, 'error'); 
            }
            showLoading(false);
        }

        async function handleDeleteCredential() {
            if (!confirm('Deseja realmente excluir?')) return;
            showLoading(true);
            const res = await MApiService.deleteCredential(currentCredentialId);
            if (res.success) { showToast('Excluída!', 'success'); await loadCredentialsFromAPI(); closeModal(); }
            showLoading(false);
        }

        function generateFormPassword() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
            let pass = '';
            for (let i=0; i<16; i++) pass += chars.charAt(Math.floor(Math.random()*chars.length));
            el.formPassword.value = pass;
            showToast('Senha gerada!', 'success');
        }

        function copyFromView(id) {
            const text = document.getElementById(id).textContent;
            copyToClipboard(text);
        }

        async function copyToClipboard(text, btn) {
            try { 
                await navigator.clipboard.writeText(text); 
                showToast('Copiado!', 'success'); 
                if(btn) {
                    const i = btn.querySelector('i');
                    i.classList.replace('bi-copy', 'bi-check');
                    setTimeout(() => i.classList.replace('bi-check', 'bi-copy'), 2000);
                }
            } catch(e) {}
        }

        function showLoading(s) { document.getElementById('mcred-loading').classList.toggle('hidden', !s); }
        function renderCategories() {
            el.categoryFilter.innerHTML = categories.map(cat => `<button class="category-btn ${cat.id === currentFilter ? 'active' : ''}" onclick="MCredApp.filter('${cat.id}')"><i class="bi ${cat.icon}"></i> ${cat.name}</button>`).join('');
        }

        function showToast(m, t) {
            const toast = document.createElement('div');
            toast.className = `toast ${t}`;
            toast.innerHTML = `<i class="bi ${t==='success'?'bi-check-circle':'bi-exclamation-circle'}"></i><span>${m}</span>`;
            el.toastContainer.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
        function truncate(s, m) { if(!s) return ''; return s.length<=m?s:s.substr(0,m)+'...'; }
        function getCategoryIcon(id) { return categories.find(c=>c.id===id)?.icon || 'bi-folder'; }
        function getCategoryName(id) { return categories.find(c=>c.id===id)?.name || 'Outros'; }

        return { init, openModal, generateFormPassword, copyFromView, filter: (id) => { currentFilter=id; renderCategories(); renderCredentials(); } };
    })();

    setTimeout(MCredApp.init, 100);
</script>
